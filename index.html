<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SOAP Médico</title>

<style>
body { font-family: Arial; padding:20px; background:#f5f5f5; }
.container { background:white; padding:20px; border-radius:10px; max-width:800px; margin:auto; }
button { padding:10px; margin:5px; border:none; border-radius:8px; cursor:pointer; }
textarea { width:100%; height:250px; margin-top:10px; }
.section { margin-bottom:15px; }
</style>

</head>

<body>

<div class="container">
<h2>Gerador de SOAP Médico</h2>

<div class="section">
<label>Sexo:</label>
<select id="sexo">
<option value="fem">Feminino</option>
<option value="masc">Masculino</option>
</select>
</div>

<div class="section">
<label>Queixa principal:</label>
<input type="text" id="qp" style="width:100%">
</div>

<div class="section">
<label>Sintomas:</label>
<input type="text" id="sintomas" style="width:100%" placeholder="Ex: febre, dor abdominal">
</div>

<button onclick="gerarSOAP()">Gerar SOAP</button>
<button onclick="copiar()">Copiar</button>

<textarea id="resultado"></textarea>
</div>

<script>
function gerarSOAP(){
let sexo = document.getElementById('sexo').value;
let qp = document.getElementById('qp').value;
let sintomas = document.getElementById('sintomas').value;

let exameFem = `EXAME FÍSICO FEM
AO EXAME: BEG, LOTE, AFEBRIL, NORMOCORADA, HIDRATADA.
NEUROLÓGICO: GLASGOW 15, SEM DÉFICITS FOCAIS, FORÇA 5/5, PUPILAS ISOCÓRICAS E FOTORREAGENTES;
AR: MVBD SEM RA, EUPNEICA;
ACV: RCR, BRNF 2T SEM SOPROS;
ABD: RHA +, FLÁCIDO, INDOLOR;
EXT: SEM EDEMAS.`;

let exameMasc = `EXAME FÍSICO MASC
AO EXAME: BEG, LOTE, ANICTÉRICO, AFEBRIL, HIDRATADO.
NEUROLÓGICO: GLASGOW 15, SEM DÉFICITS FOCAIS, FORÇA 5/5;
AR: MVBD SEM RA;
ACV: RCR, SEM SOPROS;
ABD: RHA +, INDOLOR;
EXT: SEM EDEMAS.`;

let soap = `S: ${qp} | Sintomas: ${sintomas}

O:
${sexo === 'fem' ? exameFem : exameMasc}

A: A esclarecer

P:
- Orientações
- Prescrição
- Retorno se piora`;

document.getElementById('resultado').value = soap;
}

function copiar(){
let texto = document.getElementById('resultado');
texto.select();
document.execCommand('copy');

alert('Copiado!');
}
</script>

</body>
</html>
